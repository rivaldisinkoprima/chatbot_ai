<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Val AI Chatbot</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <div class="header-content">
        <div class="bot-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7V5.73C5.4 5.39 5 4.74 5 4a2 2 0 0 1 2-2h5z"/>
            <circle cx="9" cy="10" r="1"/>
            <circle cx="15" cy="10" r="1"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Val AI</h1>
          <span class="status-indicator">
            <span class="status-dot"></span>
            Online
          </span>
        </div>
      </div>
      <button id="clear-chat" class="icon-btn" aria-label="Clear chat" title="Clear chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </header>

    <div id="chat-box" class="chat-box" role="log" aria-live="polite">
      <div class="welcome-message">
        <div class="bot-avatar-large">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7V5.73C5.4 5.39 5 4.74 5 4a2 2 0 0 1 2-2h5z"/>
          </svg>
        </div>
        <h2>Welcome to Val AI!</h2>
        <p>Start a conversation by typing a message below.</p>
      </div>
    </div>

    <div id="typing-indicator" class="typing-indicator hidden" aria-hidden="true">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <form id="chat-form" class="chat-form">
      <button type="button" id="emoji-btn" class="icon-btn" aria-label="Emoji" title="Add emoji">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>
        </svg>
      </button>
      <div class="input-wrapper">
        <textarea 
          id="user-input" 
          placeholder="Type your message..." 
          autocomplete="off" 
          required
          rows="1"
          aria-label="Message input"
        ></textarea>
        <span class="char-count"></span>
      </div>
      <button type="submit" id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </form>

    <div class="keyboard-hint">
      <kbd>Enter</kbd> to send · <kbd>Shift + Enter</kbd> for new line
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
